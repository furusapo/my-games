<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>経営 RPG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    /* ===== リセット・ベース ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a2e;
      --panel:     #2d2d44;
      --border:    #ffffff;
      --green:     #32cd32;
      --red:       #ff4444;
      --gold:      #ffd700;
      --blue:      #4fc3f7;
      --accent:    #9c88ff;
      --font:      'Press Start 2P', monospace;
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 12px 60px;
      image-rendering: pixelated;
    }

    /* ===== メインレイアウト ===== */
    .game-wrap {
      width: 100%;
      max-width: 860px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* タイトルは全幅 */
    .full-col { grid-column: 1 / -1; }

    /* ===== パネル共通 ===== */
    .panel {
      background: var(--panel);
      border: 4px solid var(--border);
      box-shadow: 6px 6px 0 #000;
      padding: 20px;
    }

    .panel-title {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--gold);
      border-bottom: 2px solid var(--gold);
      padding-bottom: 8px;
      margin-bottom: 16px;
    }

    /* ===== タイトル ===== */
    #title-bar {
      text-align: center;
      font-size: 20px;
      letter-spacing: 3px;
      padding: 16px;
    }

    /* ===== ステータスパネル ===== */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      margin-bottom: 10px;
    }

    .stat-val { color: var(--green); }
    .stat-val.neg { color: var(--red); }
    .stat-val.gold { color: var(--gold); }

    .exp-bar-wrap {
      margin: 12px 0 6px;
    }

    .bar-label {
      font-size: 8px;
      margin-bottom: 4px;
      color: #aaa;
    }

    .bar-outer {
      width: 100%;
      height: 18px;
      border: 3px solid var(--border);
      background: #111;
      overflow: hidden;
    }

    .bar-inner {
      height: 100%;
      transition: width 0.4s ease;
    }

    #exp-fill  { background: var(--green); }
    #profit-fill { background: var(--gold); }

    /* ===== 売上・経費入力 ===== */
    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 9px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input[type="text"],
    .input-row input[type="number"] {
      flex: 1;
      background: #111;
      border: 3px solid var(--border);
      color: #fff;
      font-family: var(--font);
      font-size: 10px;
      padding: 8px;
      outline: none;
    }

    .input-row input::placeholder { color: #555; }

    .btn {
      padding: 8px 14px;
      border: 3px solid var(--border);
      font-family: var(--font);
      font-size: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.96); }
    .btn-green  { background: #1a4a1a; color: var(--green); }
    .btn-green:hover { background: #2a6a2a; }
    .btn-red    { background: #4a1a1a; color: var(--red); }
    .btn-red:hover { background: #6a2a2a; }
    .btn-blue   { background: #1a3a4a; color: var(--blue); }
    .btn-blue:hover { background: #2a5a6a; }
    .btn-gold   { background: #4a3a00; color: var(--gold); }
    .btn-gold:hover { background: #6a5a00; }
    .btn-reset  { background: #8b0000; color: #fff; width: 100%; margin-top: 8px; }
    .btn-reset:hover { background: #aa0000; }

    /* ===== 履歴リスト ===== */
    .history-list {
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9px;
      padding: 6px 4px;
      border-bottom: 1px solid #444;
      gap: 6px;
    }

    .history-item .h-label { flex: 1; color: #ccc; }
    .history-item .h-date  { color: #666; font-size: 7px; white-space: nowrap; }
    .history-item .h-amt   { white-space: nowrap; }
    .history-item .h-del   {
      cursor: pointer;
      color: #666;
      font-size: 9px;
      padding: 2px 4px;
      border: 1px solid #444;
    }
    .history-item .h-del:hover { color: var(--red); border-color: var(--red); }

    /* ===== 固定費リスト ===== */
    .fixed-list { margin-bottom: 12px; }

    .fixed-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 9px;
      padding: 5px 4px;
      border-bottom: 1px solid #444;
      gap: 6px;
    }

    .fixed-item .f-label { flex: 1; color: #ccc; }
    .fixed-item .f-amt   { color: var(--red); white-space: nowrap; }
    .fixed-item .f-del   {
      cursor: pointer;
      color: #666;
      font-size: 9px;
      padding: 2px 4px;
      border: 1px solid #444;
    }
    .fixed-item .f-del:hover { color: var(--red); border-color: var(--red); }

    /* ===== クエストパネル ===== */
    .quest-btn {
      width: 100%;
      margin-bottom: 8px;
      padding: 12px 10px;
      background: #3a3a58;
      color: #fff;
      border: 3px solid var(--border);
      font-family: var(--font);
      font-size: 9px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, transform 0.1s;
    }

    .quest-btn:hover  { background: #5a5a80; }
    .quest-btn:active { transform: scale(0.97); }

    .quest-btn.locked {
      opacity: 0.3;
      cursor: not-allowed;
      background: #222;
      border-color: #555;
    }

    .quest-btn .q-unlock {
      display: block;
      font-size: 7px;
      color: #888;
      margin-top: 5px;
    }

    /* ===== サマリー数値 ===== */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .summary-card {
      background: #1a1a2e;
      border: 2px solid #444;
      padding: 10px;
      text-align: center;
    }

    .summary-card .s-label { font-size: 7px; color: #888; margin-bottom: 6px; }
    .summary-card .s-val   { font-size: 12px; }

    /* ===== 目標バー ===== */
    #goal-section { margin-top: 8px; }

    /* ===== フロートテキスト ===== */
    .float-text {
      position: fixed;
      font-size: 13px;
      pointer-events: none;
      animation: floatUp 1.3s ease-out forwards;
      z-index: 300;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; transform: translateY(-60px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-110px) scale(0.9); }
    }

    /* ===== レベルアップオーバーレイ ===== */
    #levelup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 400;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #levelup-overlay.show { display: flex; animation: fadeIn 0.3s; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .levelup-box {
      background: var(--panel);
      border: 6px solid var(--gold);
      box-shadow: 0 0 50px var(--gold), 10px 10px 0 #000;
      padding: 40px 36px;
      text-align: center;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 360px;
      width: 90%;
    }

    @keyframes popIn {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .levelup-box h2 {
      font-size: 16px;
      color: var(--gold);
      text-shadow: 0 0 12px var(--gold);
      margin-bottom: 10px;
    }

    .levelup-box .lv-num {
      font-size: 52px;
      color: #fff;
      text-shadow: 0 0 24px var(--gold);
      margin: 8px 0;
    }

    .levelup-box .lv-rank {
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .levelup-box .lv-unlock {
      font-size: 9px;
      color: var(--blue);
      line-height: 2;
      margin: 12px 0 20px;
      min-height: 1em;
    }

    .levelup-box .btn-ok {
      padding: 14px 32px;
      background: var(--gold);
      color: #000;
      border: none;
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
    }

    /* ===== パーティクル ===== */
    .particle {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 1px;
      pointer-events: none;
      z-index: 399;
      animation: pFall 1.8s ease-in forwards;
    }

    @keyframes pFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(260px) rotate(900deg); }
    }

    /* ===== レスポンシブ ===== */
    @media (max-width: 600px) {
      .game-wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- レベルアップオーバーレイ -->
<div id="levelup-overlay">
  <div class="levelup-box">
    <h2>★ LEVEL UP! ★</h2>
    <div class="lv-num" id="ov-level"></div>
    <div class="lv-rank" id="ov-rank"></div>
    <div class="lv-unlock" id="ov-unlock"></div>
    <button class="btn-ok" onclick="closeOverlay()">OK !</button>
  </div>
</div>

<div class="game-wrap">

  <!-- タイトル -->
  <div class="panel full-col" id="title-bar">
    ⚔ 経営 RPG ⚔
  </div>

  <!-- ===== 左カラム ===== -->

  <!-- キャラクターステータス -->
  <div class="panel">
    <div class="panel-title">▶ CHARACTER STATUS</div>

    <div class="stat-row">
      <span>LEVEL</span>
      <span class="stat-val gold" id="s-level">1</span>
    </div>
    <div class="stat-row">
      <span>RANK</span>
      <span class="stat-val gold" id="s-rank">見習い経営者</span>
    </div>

    <div class="exp-bar-wrap">
      <div class="bar-label">EXP &nbsp;<span id="s-exp">0</span> / <span id="s-next">100</span></div>
      <div class="bar-outer"><div class="bar-inner" id="exp-fill"></div></div>
    </div>

    <div class="stat-row" style="margin-top:14px;">
      <span>🔥 STREAK</span>
      <span class="stat-val" id="s-streak">0</span><span style="font-size:9px"> 日</span>
    </div>
    <div class="stat-row">
      <span>🏆 TOTAL QUEST</span>
      <span class="stat-val" id="s-total">0</span>
    </div>

    <hr style="border-color:#444; margin: 14px 0;">

    <!-- 月次サマリー -->
    <div class="panel-title" style="margin-top:0;">▶ THIS MONTH</div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="s-label">売上</div>
        <div class="s-val" style="color:var(--green)" id="m-sales">¥0</div>
      </div>
      <div class="summary-card">
        <div class="s-label">経費</div>
        <div class="s-val" style="color:var(--red)" id="m-expense">¥0</div>
      </div>
      <div class="summary-card">
        <div class="s-label">固定費</div>
        <div class="s-val" style="color:var(--red)" id="m-fixed">¥0</div>
      </div>
      <div class="summary-card">
        <div class="s-label">利益</div>
        <div class="s-val" id="m-profit">¥0</div>
      </div>
    </div>

    <!-- 目標利益バー -->
    <div id="goal-section">
      <div class="bar-label">月次目標利益 &nbsp;
        <span id="goal-pct">0</span>% &nbsp;
        <span style="color:#555; font-size:7px;">目標: ¥<span id="goal-val-disp">100,000</span></span>
      </div>
      <div class="bar-outer"><div class="bar-inner" id="profit-fill" style="background:var(--gold)"></div></div>
      <div style="margin-top:8px; display:flex; gap:8px;">
        <input type="number" id="goal-input" placeholder="目標金額" min="0"
          style="flex:1; background:#111; border:2px solid #555; color:#fff; font-family:var(--font); font-size:9px; padding:6px;">
        <button class="btn btn-gold" onclick="setGoal()">SET</button>
      </div>
    </div>

    <button class="btn btn-reset" onclick="resetGame()">⚠ RESET ALL DATA</button>
  </div>

  <!-- ===== 売上・経費入力 ===== -->
  <div class="panel">
    <div class="panel-title">▶ INCOME / EXPENSE</div>

    <!-- 売上入力 -->
    <div class="input-group">
      <label>💰 売上を記録する</label>
      <div class="input-row">
        <input type="text" id="sales-label" placeholder="内容（例：LP制作）">
        <input type="number" id="sales-amt" placeholder="金額" min="0">
        <button class="btn btn-green" onclick="addSales()">+</button>
      </div>
    </div>

    <!-- 経費入力 -->
    <div class="input-group">
      <label>💸 経費を記録する（変動費）</label>
      <div class="input-row">
        <input type="text" id="expense-label" placeholder="内容（例：広告費）">
        <input type="number" id="expense-amt" placeholder="金額" min="0">
        <button class="btn btn-red" onclick="addExpense()">+</button>
      </div>
    </div>

    <!-- 固定費管理 -->
    <div class="input-group">
      <label>🏠 固定費を登録する（月次）</label>
      <div class="input-row">
        <input type="text" id="fixed-label" placeholder="内容（例：家賃）">
        <input type="number" id="fixed-amt" placeholder="金額" min="0">
        <button class="btn btn-blue" onclick="addFixed()">+</button>
      </div>
    </div>

    <!-- 固定費一覧 -->
    <div class="panel-title" style="margin-top:4px;">▶ 固定費一覧（月次）</div>
    <div class="fixed-list" id="fixed-list">
      <div style="font-size:9px; color:#555;">まだ登録されていません</div>
    </div>

    <!-- 履歴 -->
    <div class="panel-title" style="margin-top:8px;">▶ 今月の取引履歴</div>
    <div class="history-list" id="history-list">
      <div style="font-size:9px; color:#555;">まだ記録がありません</div>
    </div>
  </div>

  <!-- ===== クエスト ===== -->
  <div class="panel full-col">
    <div class="panel-title">▶ QUEST BOARD</div>
    <div id="quest-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap:8px;">
      <!-- JSで生成 -->
    </div>
  </div>

</div><!-- /game-wrap -->

<script>
// ============================================================
//  ランク定義
// ============================================================
const RANKS = [
  { lv:  1, name: '見習い経営者' },
  { lv:  3, name: 'フリーランサー' },
  { lv:  5, name: '個人事業主' },
  { lv:  8, name: '小規模事業者' },
  { lv: 10, name: 'スタートアップCEO' },
  { lv: 15, name: 'シリーズA起業家' },
  { lv: 20, name: '中小企業社長' },
  { lv: 30, name: '上場企業代表' },
  { lv: 50, name: '伝説の経営者' },
];

function getRank(lv) {
  let r = RANKS[0];
  for (const rank of RANKS) { if (lv >= rank.lv) r = rank; }
  return r.name;
}

// ============================================================
//  クエスト定義
// ============================================================
const QUEST_DEFS = [
  { label: '📸 インスタ投稿',       exp: 10, unlockLevel: 1  },
  { label: '📩 営業DM送信',         exp: 20, unlockLevel: 1  },
  { label: '💻 開発30分',           exp: 30, unlockLevel: 1  },
  { label: '📄 事務作業',           exp: 15, unlockLevel: 1  },
  { label: '📊 分析レポート作成',   exp: 40, unlockLevel: 3  },
  { label: '🎥 リール動画投稿',     exp: 35, unlockLevel: 3  },
  { label: '🤝 商談・MTG参加',     exp: 50, unlockLevel: 5  },
  { label: '📝 ブログ記事執筆',     exp: 45, unlockLevel: 5  },
  { label: '🚀 新機能リリース',     exp: 80, unlockLevel: 8  },
  { label: '🏋 自己投資（学習）',   exp: 60, unlockLevel: 8  },
  { label: '💡 新規企画立案',       exp: 70, unlockLevel: 10 },
  { label: '🌐 LP公開',             exp: 100, unlockLevel: 10 },
  { label: '🤖 業務自動化',         exp: 90, unlockLevel: 15 },
  { label: '📣 プレスリリース配信', exp: 110, unlockLevel: 15 },
  { label: '🏦 資金調達MTG',       exp: 150, unlockLevel: 20 },
  { label: '🌍 海外展開施策',       exp: 200, unlockLevel: 30 },
];

// ============================================================
//  状態ロード
// ============================================================
function loadState() {
  return {
    level:    Number(localStorage.getItem('level'))    || 1,
    exp:      Number(localStorage.getItem('exp'))      || 0,
    total:    Number(localStorage.getItem('total'))    || 0,
    streak:   Number(localStorage.getItem('streak'))   || 0,
    lastDate: localStorage.getItem('lastDate')         || '',
    goal:     Number(localStorage.getItem('goal'))     || 100000,
    // 今月の取引履歴 [{type:'sales'|'expense', label, amt, date}]
    history:  JSON.parse(localStorage.getItem('history') || '[]'),
    // 固定費 [{label, amt}]
    fixedCosts: JSON.parse(localStorage.getItem('fixedCosts') || '[]'),
  };
}

let S = loadState();

// ============================================================
//  STREAK 更新
// ============================================================
(function checkStreak() {
  const today = new Date().toLocaleDateString('ja-JP');
  if (!S.lastDate) {
    S.streak = 1;
  } else if (S.lastDate !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    S.streak = (S.lastDate === yesterday.toLocaleDateString('ja-JP')) ? S.streak + 1 : 1;
  }
  S.lastDate = today;
  saveState();
})();

// ============================================================
//  保存
// ============================================================
function saveState() {
  localStorage.setItem('level',      S.level);
  localStorage.setItem('exp',        S.exp);
  localStorage.setItem('total',      S.total);
  localStorage.setItem('streak',     S.streak);
  localStorage.setItem('lastDate',   S.lastDate);
  localStorage.setItem('goal',       S.goal);
  localStorage.setItem('history',    JSON.stringify(S.history));
  localStorage.setItem('fixedCosts', JSON.stringify(S.fixedCosts));
}

// ============================================================
//  月次集計
// ============================================================
function getMonthKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function calcMonth() {
  const mk = getMonthKey();
  const items = S.history.filter(h => h.month === mk);
  const sales   = items.filter(h => h.type === 'sales').reduce((a,h) => a + h.amt, 0);
  const expense = items.filter(h => h.type === 'expense').reduce((a,h) => a + h.amt, 0);
  const fixed   = S.fixedCosts.reduce((a,f) => a + f.amt, 0);
  const profit  = sales - expense - fixed;
  return { sales, expense, fixed, profit };
}

// ============================================================
//  売上追加
// ============================================================
function addSales() {
  const label = document.getElementById('sales-label').value.trim() || '売上';
  const amt   = parseInt(document.getElementById('sales-amt').value);
  if (!amt || amt <= 0) { flashInput('sales-amt'); return; }

  S.history.push({ type: 'sales', label, amt, month: getMonthKey(), date: todayStr() });
  // 売上1万円ごとに10EXP
  const bonusExp = Math.floor(amt / 10000) * 10;
  if (bonusExp > 0) gainExp(bonusExp, null, `+${bonusExp} EXP（売上ボーナス）`);

  document.getElementById('sales-label').value = '';
  document.getElementById('sales-amt').value   = '';

  saveState();
  renderHistory();
  updateUI();
  spawnFloat(`+¥${fmt(amt)}`, 'green', document.getElementById('sales-amt'));
}

// ============================================================
//  経費追加
// ============================================================
function addExpense() {
  const label = document.getElementById('expense-label').value.trim() || '経費';
  const amt   = parseInt(document.getElementById('expense-amt').value);
  if (!amt || amt <= 0) { flashInput('expense-amt'); return; }

  S.history.push({ type: 'expense', label, amt, month: getMonthKey(), date: todayStr() });

  document.getElementById('expense-label').value = '';
  document.getElementById('expense-amt').value   = '';

  saveState();
  renderHistory();
  updateUI();
  spawnFloat(`-¥${fmt(amt)}`, 'red', document.getElementById('expense-amt'));
}

// ============================================================
//  固定費追加
// ============================================================
function addFixed() {
  const label = document.getElementById('fixed-label').value.trim() || '固定費';
  const amt   = parseInt(document.getElementById('fixed-amt').value);
  if (!amt || amt <= 0) { flashInput('fixed-amt'); return; }

  S.fixedCosts.push({ label, amt });

  document.getElementById('fixed-label').value = '';
  document.getElementById('fixed-amt').value   = '';

  saveState();
  renderFixed();
  updateUI();
}

// ============================================================
//  固定費削除
// ============================================================
function deleteFixed(idx) {
  S.fixedCosts.splice(idx, 1);
  saveState();
  renderFixed();
  updateUI();
}

// ============================================================
//  履歴削除
// ============================================================
function deleteHistory(idx) {
  S.history.splice(idx, 1);
  saveState();
  renderHistory();
  updateUI();
}

// ============================================================
//  目標設定
// ============================================================
function setGoal() {
  const v = parseInt(document.getElementById('goal-input').value);
  if (!v || v <= 0) return;
  S.goal = v;
  document.getElementById('goal-input').value = '';
  saveState();
  updateUI();
}

// ============================================================
//  EXP 獲得
// ============================================================
function gainExp(value, btnEl, floatMsg) {
  S.exp += value;
  S.total++;

  if (btnEl) spawnFloat(`+${value} EXP`, 'green', btnEl);
  if (floatMsg) spawnFloatMsg(floatMsg);

  const levelsGained = [];
  while (S.exp >= S.level * 100) {
    S.exp -= S.level * 100;
    S.level++;
    levelsGained.push(S.level);
  }

  saveState();
  renderQuests();
  updateUI();

  if (levelsGained.length > 0) {
    const newLv = levelsGained[levelsGained.length - 1];
    setTimeout(() => showLevelUp(newLv), 400);
  }
}

// ============================================================
//  UI 更新
// ============================================================
function updateUI() {
  const need    = S.level * 100;
  const expPct  = Math.min((S.exp / need) * 100, 100);
  const { sales, expense, fixed, profit } = calcMonth();
  const goalPct = S.goal > 0 ? Math.min((profit / S.goal) * 100, 100) : 0;

  document.getElementById('s-level').textContent  = S.level;
  document.getElementById('s-rank').textContent   = getRank(S.level);
  document.getElementById('s-exp').textContent    = S.exp;
  document.getElementById('s-next').textContent   = need;
  document.getElementById('s-streak').textContent = S.streak;
  document.getElementById('s-total').textContent  = S.total;
  document.getElementById('exp-fill').style.width = expPct + '%';

  document.getElementById('m-sales').textContent   = '¥' + fmt(sales);
  document.getElementById('m-expense').textContent = '¥' + fmt(expense);
  document.getElementById('m-fixed').textContent   = '¥' + fmt(fixed);

  const profitEl = document.getElementById('m-profit');
  profitEl.textContent = (profit >= 0 ? '¥' : '-¥') + fmt(Math.abs(profit));
  profitEl.style.color = profit >= 0 ? 'var(--green)' : 'var(--red)';

  document.getElementById('goal-pct').textContent     = Math.round(goalPct);
  document.getElementById('goal-val-disp').textContent = fmt(S.goal);
  document.getElementById('profit-fill').style.width  = Math.max(goalPct, 0) + '%';
}

// ============================================================
//  クエスト描画
// ============================================================
function renderQuests() {
  const c = document.getElementById('quest-container');
  c.innerHTML = '';
  QUEST_DEFS.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'quest-btn' + (S.level < q.unlockLevel ? ' locked' : '');
    if (S.level < q.unlockLevel) {
      btn.innerHTML = `🔒 ${q.label}<br>+${q.exp}EXP<span class="q-unlock">Lv.${q.unlockLevel} で解放</span>`;
      btn.disabled = true;
    } else {
      btn.innerHTML = `${q.label} &nbsp;+${q.exp}EXP`;
      btn.onclick = () => gainExp(q.exp, btn);
    }
    c.appendChild(btn);
  });
}

// ============================================================
//  固定費描画
// ============================================================
function renderFixed() {
  const el = document.getElementById('fixed-list');
  if (S.fixedCosts.length === 0) {
    el.innerHTML = '<div style="font-size:9px;color:#555;">まだ登録されていません</div>';
    return;
  }
  el.innerHTML = S.fixedCosts.map((f, i) => `
    <div class="fixed-item">
      <span class="f-label">${esc(f.label)}</span>
      <span class="f-amt">-¥${fmt(f.amt)}/月</span>
      <span class="f-del" onclick="deleteFixed(${i})">✕</span>
    </div>
  `).join('');
}

// ============================================================
//  履歴描画（今月のみ）
// ============================================================
function renderHistory() {
  const el = document.getElementById('history-list');
  const mk = getMonthKey();
  const items = S.history
    .map((h, i) => ({ ...h, _idx: i }))
    .filter(h => h.month === mk)
    .reverse();

  if (items.length === 0) {
    el.innerHTML = '<div style="font-size:9px;color:#555;">まだ記録がありません</div>';
    return;
  }

  el.innerHTML = items.map(h => `
    <div class="history-item">
      <span class="h-label">${esc(h.label)}</span>
      <span class="h-amt" style="color:${h.type==='sales'?'var(--green)':'var(--red)'}">
        ${h.type==='sales'?'+':'-'}¥${fmt(h.amt)}
      </span>
      <span class="h-date">${h.date}</span>
      <span class="h-del" onclick="deleteHistory(${h._idx})">✕</span>
    </div>
  `).join('');
}

// ============================================================
//  レベルアップ演出
// ============================================================
function showLevelUp(newLv) {
  document.getElementById('ov-level').textContent = 'Lv.' + newLv;
  document.getElementById('ov-rank').textContent  = getRank(newLv);
  const unlocked = QUEST_DEFS.filter(q => q.unlockLevel === newLv);
  document.getElementById('ov-unlock').textContent =
    unlocked.length > 0 ? '🔓 新クエスト解放！\n' + unlocked.map(q=>q.label).join('\n') : '';
  document.getElementById('levelup-overlay').classList.add('show');
  spawnParticles();
}

function closeOverlay() {
  document.getElementById('levelup-overlay').classList.remove('show');
}

// ============================================================
//  パーティクル
// ============================================================
function spawnParticles() {
  const colors = ['#ffd700','#ff6b6b','#32cd32','#00bfff','#ff69b4','#fff','#9c88ff'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `background:${colors[i%colors.length]};left:${Math.random()*100}vw;top:${Math.random()*30}vh;animation-delay:${Math.random()*0.8}s`;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

// ============================================================
//  フロートテキスト
// ============================================================
function spawnFloat(text, color, anchorEl) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.style.color = color === 'green' ? 'var(--green)' : 'var(--red)';
  el.textContent = text;
  const r = anchorEl ? anchorEl.getBoundingClientRect() : { left: window.innerWidth/2, top: window.innerHeight/2, width: 0 };
  el.style.left = (r.left + r.width / 2) + 'px';
  el.style.top  = r.top + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

function spawnFloatMsg(text) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.style.color = 'var(--gold)';
  el.style.fontSize = '11px';
  el.textContent = text;
  el.style.left = (window.innerWidth / 2 - 80) + 'px';
  el.style.top  = (window.innerHeight / 2) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ============================================================
//  ユーティリティ
// ============================================================
function fmt(n) { return Number(n).toLocaleString('ja-JP'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function todayStr() { return new Date().toLocaleDateString('ja-JP'); }

function flashInput(id) {
  const el = document.getElementById(id);
  el.style.borderColor = 'var(--red)';
  setTimeout(() => el.style.borderColor = 'var(--border)', 800);
}

// ============================================================
//  リセット
// ============================================================
function resetGame() {
  if (!confirm('すべてのデータをリセットしますか？')) return;
  localStorage.clear();
  S = loadState();
  S.streak = 1;
  S.lastDate = new Date().toLocaleDateString('ja-JP');
  saveState();
  renderQuests();
  renderFixed();
  renderHistory();
  updateUI();
}

// ============================================================
//  初期化
// ============================================================
renderQuests();
renderFixed();
renderHistory();
updateUI();
</script>
</body>
</html>
