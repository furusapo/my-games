<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furusapo Portfolio</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:#080b10;color:#fff}
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
.sidebar{background:#0f1420;border-right:1px solid #273142;padding:24px;position:sticky;top:0;height:100vh;overflow:auto}
.logo{font-size:24px;font-weight:800;margin-bottom:8px}
.sub{color:#9aa4b2;font-size:13px;margin-bottom:28px}
.section{margin:22px 0 10px;color:#6ee7ff;font-size:12px;font-weight:800;letter-spacing:.14em}
button{width:100%;text-align:left;background:#161d2b;color:#fff;border:1px solid #283449;border-radius:14px;padding:14px;margin:7px 0;cursor:pointer;font-size:15px}
button:hover,button.active{background:#22304a;border-color:#6ee7ff}
.main{padding:28px}
h1{margin:0;font-size:30px}
.desc{color:#aab4c3;line-height:1.7;margin-top:6px;margin-bottom:18px}
.card{background:#101722;border:1px solid #263246;border-radius:22px;overflow:hidden;box-shadow:0 20px 80px rgba(0,0,0,.35)}
.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 16px;border-bottom:1px solid #263246;background:#151d2b}
.title{font-weight:800}
.actions a{color:#0b1220;background:#6ee7ff;text-decoration:none;padding:9px 13px;border-radius:999px;font-weight:800;font-size:13px}
iframe{width:100%;height:72vh;border:0;background:#fff}
.menuToggle{display:none}
@media(max-width:800px){
  .app{display:block}
  .sidebar{position:fixed;z-index:10;left:-290px;top:0;transition:.25s;width:280px}
  .sidebar.open{left:0}
  .menuToggle{display:block;position:fixed;z-index:20;right:16px;bottom:16px;border-radius:999px;width:auto;background:#6ee7ff;color:#071018;font-weight:900;padding:14px 18px}
  .main{padding:18px}
  h1{font-size:24px}
  iframe{height:68vh}
}
</style>
</head>
<body>
<button class="menuToggle" onclick="toggleMenu()">☰ MENU</button>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">Furusapo Portfolio</div>
    <div class="sub">AI × HTML × JavaScript<br>作ったもの一覧</div>

    <div class="section">GAMES</div>
    <button class="active" onclick="loadPage(this,'keiei-rpg.html','経営RPG','経営シミュレーションゲーム')">🎮 経営RPG</button>
    <button onclick="loadPage(this,'fighter.html','FAMICOM Fighter','レトロ風ファイターゲーム')">🥊 Fighter</button>
    <button onclick="loadPage(this,'ar-shooter.html','AR Shooter','ブラウザシューティング')">🔫 AR Shooter</button>
    <button onclick="loadPage(this,'ondoku.html','音読ゲーム','音読トレーニングアプリ')">📖 音読ゲーム</button>

    <div class="section">BUSINESS SYSTEM</div>
    <button onclick="loadPage(this,'https://furusapo.github.io/totonoiplus-giftcard/','TOTONOI+ Gift Card','ギフトカード発行・管理システム')">💳 ギフトカード</button>
    <button onclick="loadPage(this,'https://furusapo.github.io/totonoi-reservation/','TOTONOI+ Reservation','予約・決済システム')">🧖 予約システム</button>
    <button onclick="loadPage(this,'https://furusapo.github.io/kenchan-access/','じてんしゃ屋 KENchan','大宮公園店 アクセスマップ')">🚲 じてんしゃ屋 KENchan</button>

  </aside>

  <main class="main">
    <h1 id="pageTitle">経営RPG</h1>
    <div class="desc" id="pageDesc">経営シミュレーションゲーム</div>

    <div class="card">
      <div class="topbar">
        <div class="title">Preview</div>
        <div class="actions"><a id="openLink" href="keiei-rpg.html" target="_blank">新しいタブで開く</a></div>
      </div>
      <iframe id="viewer" src="keiei-rpg.html"></iframe>
    </div>
  </main>
</div>

<script>
function loadPage(btn,url,title,desc){
  document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('viewer').src=url;
  document.getElementById('openLink').href=url;
  document.getElementById('pageTitle').textContent=title;
  document.getElementById('pageDesc').textContent=desc;
  document.getElementById('sidebar').classList.remove('open');
}
function toggleMenu(){
  document.getElementById('sidebar').classList.toggle('open');
}
</script>
</body>
</html>
