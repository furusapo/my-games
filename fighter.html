<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAMICOM FIGHTER</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Press Start 2P', monospace;
    }

    #screen {
      position: relative;
      width: 512px;
      height: 480px;
      background: #000;
      border: 6px solid #fff;
      box-shadow: 0 0 0 4px #888, 0 0 0 8px #444, 16px 16px 0 #000;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 512px;
      height: 480px;
    }

    /* オーバーレイ共通 */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 10;
    }

    .overlay h1 {
      font-size: 28px;
      color: #ff0;
      text-shadow: 3px 3px 0 #f00;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }

    .overlay h2 {
      font-size: 16px;
      color: #fff;
      margin-bottom: 32px;
    }

    .overlay p {
      font-size: 9px;
      color: #aaa;
      margin: 4px 0;
      line-height: 2;
    }

    .overlay .blink {
      font-size: 12px;
      color: #0f0;
      animation: blink 0.8s step-end infinite;
      margin-top: 24px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .overlay .result-win  { font-size: 22px; color: #ff0; text-shadow: 2px 2px 0 #f80; }
    .overlay .result-lose { font-size: 22px; color: #f44; text-shadow: 2px 2px 0 #800; }
    .overlay .result-draw { font-size: 22px; color: #4ff; text-shadow: 2px 2px 0 #088; }

    #controls-hint {
      margin-top: 14px;
      font-size: 9px;
      color: #666;
      text-align: center;
      line-height: 2;
    }
  </style>
</head>
<body>

<div id="screen">
  <canvas id="c" width="512" height="480"></canvas>

  <!-- タイトル画面 -->
  <div class="overlay" id="title-screen">
    <h1>FAMICOM<br>FIGHTER</h1>
    <p style="color:#f80; font-size:10px;">1P vs CPU</p>
    <br>
    <p>[ PLAYER 1 ]</p>
    <p>移動 : ← →　　ジャンプ : ↑</p>
    <p>パンチ : Z　　キック : X</p>
    <p>必殺技 : ↓ + Z</p>
    <div class="blink">PRESS ENTER TO START</div>
  </div>

  <!-- ラウンド開始 -->
  <div class="overlay" id="round-screen" style="display:none; background:transparent; pointer-events:none;">
    <h2 id="round-text" style="font-size:24px; color:#ff0; text-shadow:3px 3px 0 #000;"></h2>
  </div>

  <!-- 結果画面 -->
  <div class="overlay" id="result-screen" style="display:none;">
    <div id="result-msg"></div>
    <br>
    <p id="result-sub" style="font-size:10px; color:#aaa; margin-top:8px;"></p>
    <div class="blink" style="margin-top:20px;">PRESS ENTER</div>
  </div>
</div>

<div id="controls-hint">
  P1: ← → 移動 &nbsp;|&nbsp; ↑ ジャンプ &nbsp;|&nbsp; Z パンチ &nbsp;|&nbsp; X キック &nbsp;|&nbsp; ↓+Z 必殺技
</div>

<script>
// ============================================================
//  定数
// ============================================================
const W = 512, H = 480;
const FLOOR_Y = 340;
const GRAVITY = 0.6;
const JUMP_VY = -14;
const MOVE_SPD = 3.5;
const MAX_HP = 100;
const ROUNDS_TO_WIN = 2;

// ファミコン16色パレット風
const PAL = {
  sky1: '#6b8cff', sky2: '#3040b0',
  ground: '#a05000', groundLine: '#c87020',
  crowd: '#3a1a6a',
  p1body: '#e03020', p1skin: '#f8c080', p1hair: '#301808',
  p2body: '#2050e0', p2skin: '#f8c080', p2hair: '#101030',
  hpGreen: '#00d000', hpYellow: '#d0d000', hpRed: '#d00000',
  hpBg: '#300000', hpBorder: '#ffffff',
  shadow: 'rgba(0,0,0,0.4)',
  hitSpark: '#ffff00',
  special: '#00ffff',
};

// ============================================================
//  入力
// ============================================================
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// ============================================================
//  ファイター クラス
// ============================================================
class Fighter {
  constructor(x, color, isPlayer, name) {
    this.x = x; this.y = FLOOR_Y;
    this.vx = 0; this.vy = 0;
    this.w = 44; this.h = 72;
    this.hp = MAX_HP;
    this.facing = 1; // 1=右, -1=左
    this.onGround = true;
    this.isPlayer = isPlayer;
    this.name = name;
    this.color = color;

    // アニメ
    this.state = 'idle'; // idle/walk/jump/punch/kick/special/hurt/ko
    this.stateTimer = 0;
    this.frame = 0;
    this.frameTimer = 0;

    // 攻撃判定
    this.hitbox = null;
    this.hitCooldown = 0;
    this.beenHit = false;

    // 必殺技
    this.specialCooldown = 0;
    this.specialActive = false;
    this.specialX = 0;
    this.specialVx = 0;

    // CPU用
    this.aiTimer = 0;
    this.aiAction = 'idle';
  }

  get cx() { return this.x + this.w / 2; }
  get cy() { return this.y + this.h / 2; }
  get feet() { return this.y + this.h; }

  isAttacking() { return this.state === 'punch' || this.state === 'kick' || this.state === 'special'; }
  isKO()        { return this.state === 'ko'; }

  applyGravity() {
    if (!this.onGround) {
      this.vy += GRAVITY;
      this.y += this.vy;
      if (this.feet >= FLOOR_Y) {
        this.y = FLOOR_Y - this.h;
        this.vy = 0;
        this.onGround = true;
        if (this.state === 'jump') this.state = 'idle';
      }
    }
  }

  clampX() {
    this.x = Math.max(10, Math.min(W - this.w - 10, this.x));
  }

  punch(target) {
    if (this.hitCooldown > 0 || this.isKO()) return;
    this.state = 'punch';
    this.stateTimer = 22;
    this.hitCooldown = 28;
    // 判定は前方
    this.hitbox = {
      x: this.x + (this.facing > 0 ? this.w : -50),
      y: this.y + 10,
      w: 50, h: 30,
      dmg: 8, type: 'punch'
    };
  }

  kick(target) {
    if (this.hitCooldown > 0 || this.isKO()) return;
    this.state = 'kick';
    this.stateTimer = 26;
    this.hitCooldown = 32;
    this.hitbox = {
      x: this.x + (this.facing > 0 ? this.w - 10 : -60),
      y: this.y + 30,
      w: 60, h: 36,
      dmg: 14, type: 'kick'
    };
  }

  special() {
    if (this.specialCooldown > 0 || this.isKO()) return;
    this.state = 'special';
    this.stateTimer = 30;
    this.specialCooldown = 120;
    this.specialActive = true;
    this.specialX = this.x + (this.facing > 0 ? this.w : 0);
    this.specialVx = this.facing * 8;
  }

  hurt(dmg) {
    if (this.isKO()) return;
    this.hp = Math.max(0, this.hp - dmg);
    this.state = 'hurt';
    this.stateTimer = 18;
    this.vx = -this.facing * 3;
    this.beenHit = true;
    if (this.hp <= 0) {
      this.state = 'ko';
      this.stateTimer = 9999;
    }
  }

  update(opponent) {
    // タイマー
    if (this.stateTimer > 0) {
      this.stateTimer--;
      if (this.stateTimer === 0 && this.state !== 'ko') {
        this.state = 'idle';
        this.hitbox = null;
      }
    }
    if (this.hitCooldown > 0) this.hitCooldown--;
    if (this.specialCooldown > 0) this.specialCooldown--;

    // 必殺弾
    if (this.specialActive) {
      this.specialX += this.specialVx;
      // 当たり判定
      if (this.specialX > opponent.x && this.specialX < opponent.x + opponent.w &&
          this.specialX > 0 && this.specialX < W) {
        opponent.hurt(22);
        this.specialActive = false;
        spawnSpark(opponent.cx, opponent.cy, '#00ffff');
      }
      if (this.specialX < 0 || this.specialX > W) this.specialActive = false;
    }

    // 向き
    if (!this.isKO()) {
      this.facing = opponent.cx > this.cx ? 1 : -1;
    }

    // 重力
    this.applyGravity();

    // 移動摩擦
    if (this.onGround && this.state !== 'punch' && this.state !== 'kick') {
      this.vx *= 0.7;
    }
    this.x += this.vx;
    this.clampX();

    // ヒット判定
    if (this.hitbox && !opponent.beenHit) {
      const hb = this.hitbox;
      if (opponent.x < hb.x + hb.w && opponent.x + opponent.w > hb.x &&
          opponent.y < hb.y + hb.h && opponent.y + opponent.h > hb.y) {
        opponent.hurt(hb.dmg);
        this.hitbox = null;
        spawnSpark(
          (hb.x + hb.w/2 + opponent.cx) / 2,
          (hb.y + hb.h/2 + opponent.cy) / 2,
          hb.type === 'kick' ? '#ff8800' : '#ffff00'
        );
      }
    }
    opponent.beenHit = false;

    // フレームアニメ
    this.frameTimer++;
    if (this.frameTimer >= 8) { this.frameTimer = 0; this.frame = (this.frame + 1) % 2; }
  }

  // ===== CPU AI =====
  updateAI(player) {
    if (this.isKO()) return;
    this.aiTimer--;
    if (this.aiTimer > 0) return;

    const dist = Math.abs(this.cx - player.cx);
    const r = Math.random();

    if (dist > 160) {
      // 近づく
      this.vx = this.facing * MOVE_SPD;
      this.aiTimer = 20;
    } else if (dist < 60) {
      // 離れる
      this.vx = -this.facing * MOVE_SPD * 0.8;
      this.aiTimer = 15;
    } else {
      // 攻撃判断
      if (r < 0.08 && this.specialCooldown === 0) {
        this.special();
        this.aiTimer = 60;
      } else if (r < 0.3) {
        this.kick(player);
        this.aiTimer = 35;
      } else if (r < 0.6) {
        this.punch(player);
        this.aiTimer = 28;
      } else if (r < 0.7 && this.onGround) {
        // ジャンプ攻撃
        this.vy = JUMP_VY;
        this.onGround = false;
        this.state = 'jump';
        this.aiTimer = 30;
      } else {
        this.aiTimer = 10;
      }
    }

    // たまにジャンプ回避
    if (r < 0.05 && this.onGround) {
      this.vy = JUMP_VY;
      this.onGround = false;
      this.state = 'jump';
    }
  }
}

// ============================================================
//  スパーク エフェクト
// ============================================================
const sparks = [];
function spawnSpark(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.4;
    sparks.push({
      x, y,
      vx: Math.cos(angle) * (3 + Math.random() * 3),
      vy: Math.sin(angle) * (3 + Math.random() * 3),
      life: 18 + Math.random() * 10,
      color,
      size: 4 + Math.random() * 4
    });
  }
}

function updateSparks() {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.3;
    s.life--;
    if (s.life <= 0) sparks.splice(i, 1);
  }
}

// ============================================================
//  背景描画（ファミコン風）
// ============================================================
function drawBG(ctx) {
  // 空グラデ風（2色）
  ctx.fillStyle = PAL.sky2;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = PAL.sky1;
  ctx.fillRect(0, 80, W, 220);

  // 観客席（ドット風）
  ctx.fillStyle = PAL.crowd;
  ctx.fillRect(0, 200, W, 100);
  for (let x = 0; x < W; x += 16) {
    for (let y = 200; y < 300; y += 16) {
      ctx.fillStyle = (Math.floor(x/16 + y/16)) % 2 === 0 ? '#4a2080' : '#3a1060';
      ctx.fillRect(x, y, 16, 16);
      // 頭
      ctx.fillStyle = ['#f8c080','#d09060','#805030','#f0a060'][(x/16 + y/16) % 4];
      ctx.fillRect(x+4, y+2, 8, 8);
    }
  }

  // 地面
  ctx.fillStyle = PAL.ground;
  ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);
  ctx.fillStyle = PAL.groundLine;
  ctx.fillRect(0, FLOOR_Y, W, 6);
  // タイル模様
  for (let x = 0; x < W; x += 32) {
    ctx.fillStyle = '#b06010';
    ctx.fillRect(x, FLOOR_Y + 6, 1, H - FLOOR_Y - 6);
  }
  for (let y = FLOOR_Y + 6; y < H; y += 24) {
    ctx.fillStyle = '#b06010';
    ctx.fillRect(0, y, W, 1);
  }
}

// ============================================================
//  キャラ描画（ドット絵風）
// ============================================================
function drawFighter(ctx, f) {
  const x = Math.round(f.x);
  const y = Math.round(f.y);
  const fl = f.facing;
  const skin = f.isPlayer ? PAL.p1skin : PAL.p2skin;
  const body = f.isPlayer ? PAL.p1body : PAL.p2body;
  const hair = f.isPlayer ? PAL.p1hair : PAL.p2hair;
  const pants = f.isPlayer ? '#601010' : '#102060';

  ctx.save();
  // 影
  ctx.fillStyle = PAL.shadow;
  ctx.beginPath();
  ctx.ellipse(x + f.w/2, FLOOR_Y, 22, 6, 0, 0, Math.PI*2);
  ctx.fill();

  // KO時は倒れる
  if (f.state === 'ko') {
    ctx.translate(x + f.w/2, y + f.h);
    ctx.rotate(fl * Math.PI / 2);
    ctx.translate(-f.w/2, -f.h);
    drawBody(ctx, 0, 0, f, skin, body, hair, pants);
    ctx.restore();
    return;
  }

  // 被ダメ時は赤フラッシュ
  if (f.state === 'hurt' && f.stateTimer % 4 < 2) {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#ff0000';
  }

  drawBody(ctx, x, y, f, skin, body, hair, pants);
  ctx.restore();
}

function drawBody(ctx, x, y, f, skin, body, hair, pants) {
  const fl = f.facing;
  const bob = f.state === 'idle' ? Math.sin(Date.now() / 200) * 1.5 : 0;
  const walkBob = f.state === 'walk' ? Math.sin(Date.now() / 100) * 3 : 0;
  const yOff = bob + walkBob;

  // 足（パンツ）
  const legSwing = (f.state === 'walk') ? Math.sin(Date.now() / 100) * 8 : 0;
  ctx.fillStyle = pants;
  // 左足
  ctx.fillRect(x+8,  y+44+yOff+legSwing,  12, 22);
  // 右足
  ctx.fillRect(x+24, y+44+yOff-legSwing, 12, 22);
  // 靴
  ctx.fillStyle = '#202020';
  ctx.fillRect(x+6,  y+62+yOff+legSwing,  14, 8);
  ctx.fillRect(x+22, y+62+yOff-legSwing, 14, 8);

  // 胴体
  ctx.fillStyle = body;
  ctx.fillRect(x+6, y+20+yOff, 32, 28);

  // 腕
  const punchOff = f.state === 'punch' ? fl * 20 : 0;
  const kickOff  = f.state === 'kick'  ? fl * 4  : 0;
  ctx.fillStyle = body;
  // 前腕
  ctx.fillRect(x + (fl>0 ? 34 : -10) + punchOff, y+22+yOff, 12, 10);
  // 後腕
  ctx.fillRect(x + (fl>0 ? -6 : 34), y+22+yOff, 10, 10);
  // 拳
  ctx.fillStyle = skin;
  ctx.fillRect(x + (fl>0 ? 44 : -14) + punchOff, y+22+yOff, 10, 10);

  // 蹴り足
  if (f.state === 'kick') {
    ctx.fillStyle = pants;
    ctx.fillRect(x + (fl>0 ? 36 : -24), y+38+yOff, 28, 12);
    ctx.fillStyle = '#202020';
    ctx.fillRect(x + (fl>0 ? 54 : -30), y+38+yOff, 14, 12);
  }

  // 頭
  ctx.fillStyle = skin;
  ctx.fillRect(x+10, y+2+yOff, 24, 20);
  // 髪
  ctx.fillStyle = hair;
  ctx.fillRect(x+10, y+yOff, 24, 8);
  ctx.fillRect(x+8,  y+2+yOff, 4, 6);
  // 目
  ctx.fillStyle = '#000';
  const eyeX = fl > 0 ? x+26 : x+10;
  ctx.fillRect(eyeX, y+8+yOff, 4, 4);
  // 口（攻撃中は開く）
  if (f.isAttacking()) {
    ctx.fillStyle = '#600';
    ctx.fillRect(eyeX - fl*2, y+14+yOff, 6, 4);
  }

  // 必殺技エフェクト（オーラ）
  if (f.state === 'special') {
    ctx.strokeStyle = PAL.special;
    ctx.lineWidth = 3;
    ctx.strokeRect(x+2, y+2+yOff, f.w-4, f.h-4);
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = PAL.special;
    ctx.fillRect(x, y+yOff, f.w, f.h);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
//  必殺弾描画
// ============================================================
function drawSpecial(ctx, f) {
  if (!f.specialActive) return;
  const sx = f.specialX;
  const sy = f.y + f.h / 2;
  ctx.save();
  ctx.fillStyle = f.isPlayer ? '#00ffff' : '#ff00ff';
  // 波動拳風
  for (let i = 0; i < 3; i++) {
    const r = 12 - i * 3;
    ctx.globalAlpha = 1 - i * 0.25;
    ctx.beginPath();
    ctx.arc(sx - f.specialVx * i * 2, sy, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ============================================================
//  HPバー描画
// ============================================================
function drawHPBars(ctx, p1, p2) {
  const BAR_W = 180, BAR_H = 18, BAR_Y = 14;

  function hpColor(hp) {
    if (hp > 60) return PAL.hpGreen;
    if (hp > 30) return PAL.hpYellow;
    return PAL.hpRed;
  }

  // P1（左）
  ctx.fillStyle = '#000';
  ctx.fillRect(20, BAR_Y, BAR_W + 4, BAR_H + 4);
  ctx.fillStyle = PAL.hpBg;
  ctx.fillRect(22, BAR_Y+2, BAR_W, BAR_H);
  ctx.fillStyle = hpColor(p1.hp);
  ctx.fillRect(22, BAR_Y+2, BAR_W * p1.hp / MAX_HP, BAR_H);
  ctx.strokeStyle = PAL.hpBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(20, BAR_Y, BAR_W + 4, BAR_H + 4);

  // P1名前
  ctx.fillStyle = '#fff';
  ctx.font = '8px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText(p1.name, 22, BAR_Y - 2);

  // P2（右）
  const p2x = W - 20 - BAR_W - 4;
  ctx.fillStyle = '#000';
  ctx.fillRect(p2x, BAR_Y, BAR_W + 4, BAR_H + 4);
  ctx.fillStyle = PAL.hpBg;
  ctx.fillRect(p2x+2, BAR_Y+2, BAR_W, BAR_H);
  // P2は右から減る
  const p2w = BAR_W * p2.hp / MAX_HP;
  ctx.fillStyle = hpColor(p2.hp);
  ctx.fillRect(p2x + 2 + (BAR_W - p2w), BAR_Y+2, p2w, BAR_H);
  ctx.strokeStyle = PAL.hpBorder;
  ctx.lineWidth = 2;
  ctx.strokeRect(p2x, BAR_Y, BAR_W + 4, BAR_H + 4);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.fillText(p2.name, W - 22, BAR_Y - 2);

  // タイマー
  ctx.textAlign = 'center';
  ctx.font = '16px "Press Start 2P"';
  ctx.fillStyle = '#fff';
  ctx.fillText(Math.ceil(timer / 60), W/2, 34);

  // ラウンド勝利マーク
  for (let i = 0; i < ROUNDS_TO_WIN; i++) {
    ctx.fillStyle = i < p1wins ? '#ff0' : '#333';
    ctx.fillRect(22 + i * 16, BAR_Y + BAR_H + 8, 12, 8);
    ctx.fillStyle = i < p2wins ? '#ff0' : '#333';
    ctx.fillRect(W - 22 - (i+1) * 16, BAR_Y + BAR_H + 8, 12, 8);
  }
}

// ============================================================
//  スパーク描画
// ============================================================
function drawSparks(ctx) {
  sparks.forEach(s => {
    ctx.globalAlpha = s.life / 28;
    ctx.fillStyle = s.color;
    ctx.fillRect(s.x - s.size/2, s.y - s.size/2, s.size, s.size);
  });
  ctx.globalAlpha = 1;
}

// ============================================================
//  ゲーム状態
// ============================================================
let p1, p2;
let timer, roundTimer;
let p1wins = 0, p2wins = 0;
let gameState = 'title'; // title / roundStart / fight / result / gameOver

function initRound() {
  p1 = new Fighter(80,  PAL.p1body, true,  '1P');
  p2 = new Fighter(380, PAL.p2body, false, 'CPU');
  p1.facing =  1;
  p2.facing = -1;
  timer = 60 * 60; // 60秒
  sparks.length = 0;
  gameState = 'roundStart';
  roundTimer = 120;
  document.getElementById('round-screen').style.display = 'flex';
  document.getElementById('round-text').textContent = `ROUND ${p1wins + p2wins + 1}`;
  setTimeout(() => {
    document.getElementById('round-screen').style.display = 'none';
    gameState = 'fight';
  }, 2000);
}

function showResult(msg, sub, cls) {
  gameState = 'result';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';
  document.getElementById('result-msg').innerHTML = `<div class="${cls}">${msg}</div>`;
  document.getElementById('result-sub').textContent = sub;
}

// ============================================================
//  入力処理
// ============================================================
function handleInput() {
  if (p1.isKO()) return;

  const left  = keys['ArrowLeft'];
  const right = keys['ArrowRight'];
  const up    = keys['ArrowUp'];
  const down  = keys['ArrowDown'];
  const z     = keys['KeyZ'];
  const x     = keys['KeyX'];

  if (left)  { p1.vx = -MOVE_SPD; if (p1.onGround && !p1.isAttacking()) p1.state = 'walk'; }
  else if (right) { p1.vx = MOVE_SPD; if (p1.onGround && !p1.isAttacking()) p1.state = 'walk'; }
  else if (p1.onGround && !p1.isAttacking() && p1.state !== 'hurt') { p1.state = 'idle'; }

  if (up && p1.onGround) {
    p1.vy = JUMP_VY;
    p1.onGround = false;
    p1.state = 'jump';
  }

  if (z && down) { p1.special(); }
  else if (z)    { p1.punch(p2); }
  else if (x)    { p1.kick(p2); }
}

// ============================================================
//  メインループ
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let lastEnter = false;

function loop() {
  requestAnimationFrame(loop);

  const enterNow = keys['Enter'];
  const enterPressed = enterNow && !lastEnter;
  lastEnter = enterNow;

  // タイトル
  if (gameState === 'title') {
    drawBG(ctx);
    if (enterPressed) {
      document.getElementById('title-screen').style.display = 'none';
      p1wins = 0; p2wins = 0;
      initRound();
    }
    return;
  }

  // 結果画面
  if (gameState === 'result' || gameState === 'gameOver') {
    drawBG(ctx);
    if (p1 && p2) { drawFighter(ctx, p1); drawFighter(ctx, p2); }
    drawSparks(ctx);
    if (enterPressed) {
      document.getElementById('result-screen').style.display = 'none';
      if (gameState === 'gameOver') {
        p1wins = 0; p2wins = 0;
        document.getElementById('title-screen').style.display = 'flex';
        gameState = 'title';
      } else {
        initRound();
      }
    }
    return;
  }

  if (gameState !== 'fight' && gameState !== 'roundStart') return;

  // 入力
  if (gameState === 'fight') handleInput();

  // 更新
  if (gameState === 'fight') {
    p1.update(p2);
    p2.update(p1);
    p2.updateAI(p1);
    updateSparks();
    timer--;
  }

  // 描画
  drawBG(ctx);
  drawFighter(ctx, p1);
  drawFighter(ctx, p2);
  drawSpecial(ctx, p1);
  drawSpecial(ctx, p2);
  drawSparks(ctx);
  drawHPBars(ctx, p1, p2);

  // 必殺技クールダウン表示
  if (p1.specialCooldown > 0) {
    ctx.fillStyle = '#00ffff';
    ctx.font = '7px "Press Start 2P"';
    ctx.textAlign = 'left';
    ctx.fillText('SPECIAL COOL: ' + Math.ceil(p1.specialCooldown/60*2), 22, H - 10);
  } else {
    ctx.fillStyle = '#0f0';
    ctx.font = '7px "Press Start 2P"';
    ctx.textAlign = 'left';
    ctx.fillText('SPECIAL READY! (↓+Z)', 22, H - 10);
  }

  // 勝敗判定
  if (gameState !== 'fight') return;

  const p1ko = p1.isKO();
  const p2ko = p2.isKO();
  const timeout = timer <= 0;

  if (p1ko || p2ko || timeout) {
    gameState = 'result';
    setTimeout(() => {
      if (p2ko && !p1ko) {
        p1wins++;
        if (p1wins >= ROUNDS_TO_WIN) {
          showResult('YOU WIN!', `${p1wins} - ${p2wins} で勝利！`, 'result-win');
          gameState = 'gameOver';
        } else {
          showResult('ROUND WIN!', 'Enterで次のラウンドへ', 'result-win');
        }
      } else if (p1ko && !p2ko) {
        p2wins++;
        if (p2wins >= ROUNDS_TO_WIN) {
          showResult('YOU LOSE...', `${p1wins} - ${p2wins} で敗北`, 'result-lose');
          gameState = 'gameOver';
        } else {
          showResult('ROUND LOSE', 'Enterで次のラウンドへ', 'result-lose');
        }
      } else {
        // 時間切れ or 同時KO
        if (p1.hp > p2.hp) {
          p1wins++;
          showResult('TIME! WIN', 'HPが多い方の勝ち', 'result-win');
        } else if (p2.hp > p1.hp) {
          p2wins++;
          showResult('TIME! LOSE', 'HPが少なかった…', 'result-lose');
        } else {
          showResult('DRAW!', '引き分け', 'result-draw');
        }
        if (p1wins >= ROUNDS_TO_WIN || p2wins >= ROUNDS_TO_WIN) gameState = 'gameOver';
      }
    }, 800);
  }
}

loop();
</script>
